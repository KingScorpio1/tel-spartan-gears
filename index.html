function AIinitPop() {
  rebuildKNN();
  AI.population = [];
  for (let i = 0; i < AI.popSize; i++) {
    // Seed with params whose predicted range is near the target board (z=7.5)
    let params, bestR = Infinity;
    for (let a = 0; a < 30; a++) {
      const p = randomParams();
      const R = predictRange(p);
      const dist = Math.abs(R - 7.5);
      if (dist < bestR) { bestR = dist; params = p; }
      if (dist < 1.5) break; // close enough
    }
    const prior = physicsScore(params);
    AI.population.push({ params, fitness: prior * 0.3, sumDz: 0, sumDx: 0, sumDy: 0, sumProx: 0, count: 0 });
  }
  AI.gen = 1;
  AI.idx = 0;
  AI.trial = 0;
  AI.hits = 0;
  AI.genHits = 0;
  AI.genTotal = 0;
  AI.prevGenAcc = null;
}

function AInextGen() {
  // Sort by fitness descending
  AI.population.sort((a, b) => b.fitness - a.fitness);
  const next = AI.population.slice(0, AI.eliteCount).map(p => ({
    params: { ...p.params }, fitness: 0, sumDz: 0, sumDx: 0, sumDy: 0, sumProx: 0, count: 0,
  }));
  while (next.length < AI.popSize) {
    const parent = AI.population[Math.floor(Math.random() * AI.eliteCount)];
    const parentAvgDz = parent.count > 0 ? parent.sumDz / parent.count : null;
    const parentAvgDx = parent.count > 0 ? parent.sumDx / parent.count : null;
    const parentAvgDy = parent.count > 0 ? parent.sumDy / parent.count : null;
    const raw = mutateByErrorWithAvoid(parent.params, parentAvgDz, parentAvgDx, parentAvgDy);
    const refined = knnRefine(raw, currentTargetId());
    next.push({
      params: refined,
      fitness: 0, sumDz: 0, sumDx: 0, sumDy: 0, sumProx: 0, count: 0,
    });
  }
  // Compute gen accuracy trend
  const curGenAcc = AI.genTotal > 0 ? AI.genHits / AI.genTotal : 0;
  const delta = AI.prevGenAcc != null ? ((curGenAcc - AI.prevGenAcc) * 100).toFixed(1) : null;
  const deltaStr = delta != null ? `  (${delta >= 0 ? '+' : ''}${delta}% vs gen ${AI.gen})` : '';
  AI.prevGenAcc = curGenAcc;

  AI.population = next;
  AI.gen++;
  AI.idx = 0;
  AI.trial = 0;
  AI.hits = 0;
  AI.genHits = 0;
  AI.genTotal = 0;
  const pct = (curGenAcc * 100).toFixed(1);
  const best = AI.population[0];
  let errLog = '';
  if (best && best.count > 0) {
    const dz = (best.sumDz / best.count).toFixed(2);
    const dx = (best.sumDx / best.count).toFixed(2);
    const dy = (best.sumDy / best.count).toFixed(2);
    errLog = `  avgErr: dz=${dz} dx=${dx} dy=${dy}`;
  }
  const tgtId = currentTargetId();
  const solved = AI.solvedTargets.length;
  const totalTgts = AI.targetOrder.length;
  log(`Gen ${AI.gen - 1} done. Target: ${tgtId} (${solved}/${totalTgts})  Best: ${(AI.bestAccuracy * 100).toFixed(1)}%  Saved: ${AI.savedSets.length}  Gen Acc: ${pct}%${deltaStr}${errLog}  Total: ${AI.totalTrials}`);
  // Simulated annealing: reduce mutation rate as fitness improves
  AI.mutationStd = Math.max(0.01, 0.15 * (1 - Math.min(AI.bestAccuracy, 1)));
}

function AInextIndividual() {
  const ind = AI.population[AI.idx];
  AI.trial = 0;
  AI.hits = 0;
  noisyTrial(ind.params);
  AI.trial++;
  const bestPct = (AI.bestAccuracy * 100).toFixed(0);
  const R = predictRange(ind.params).toFixed(1);
  const errStr = ind.count > 0 ? `  dz=${(ind.sumDz/ind.count).toFixed(2)} dx=${(ind.sumDx/ind.count).toFixed(2)} dy=${(ind.sumDy/ind.count).toFixed(2)}` : '';
  const tgt = currentTargetId();
  const solved = AI.solvedTargets.length;
  const total = AI.targetOrder.length;
  setStatus(`[AI] ${tgt} (${solved}/${total} solved) G${AI.gen}/${AI.idx+1}/${AI.popSize}  R=${R}m${errStr}  Best: ${bestPct}%  Saved: ${AI.savedSets.length}`);
}

function AIstart(resume) {
  AI.running = true;
  rebuildKNN();
  // Ensure target order is populated
  if (AI.targetOrder.length === 0 && targetCircles.length > 0) buildTargetOrder();
  const hasKnowledge = trainingData.totalTrials > 0 && trainingData.bestParams != null;

  if (resume && hasKnowledge) {
    // Resume from saved training data
    AI.bestAccuracy = trainingData.bestAccuracy;
    AI.bestParams = { ...trainingData.bestParams };
    AI.savedSets = trainingData.savedSets.map(s => ({ ...s, params: { ...s.params } }));
    AI.totalTrials = trainingData.totalTrials;
    // Seed population from best saved params + mutations (with directional guidance)
    AI.population = [];
    const tgtId = currentTargetId();
    for (let i = 0; i < AI.popSize; i++) {
      if (i === 0 && AI.bestParams) {
        AI.population.push({ params: { ...AI.bestParams }, fitness: AI.bestAccuracy, sumDz: 0, sumDx: 0, sumDy: 0, sumProx: 0, count: 0 });
      } else {
        const base = AI.bestParams ? mutateParamsAvoid(AI.bestParams) : randomParams();
        const p = knnRefine(base, tgtId);
        AI.population.push({ params: p, fitness: physicsScore(p) * 0.3, sumDz: 0, sumDx: 0, sumDy: 0, sumProx: 0, count: 0 });
      }
    }
    AI.gen = Math.floor(AI.totalTrials / (AI.popSize * AI.trialsPerInd)) + 1;
    const badBins = Object.values(paramBinData).filter(d => d.total >= 5 && d.hits / d.total < 0.6).length;
    const tgt = currentTargetId();
    const solved = AI.solvedTargets.length;
    log(`=== Resumed: ${AI.totalTrials} trials, best ${(AI.bestAccuracy*100).toFixed(1)}%. ${solved}/${AI.targetOrder.length} targets solved. Current: ${tgt}. Bad zones: ${badBins} ===`);
  } else {
    // "Fresh" start but with accumulated parameter-zone knowledge
    AI.bestAccuracy = hasKnowledge ? trainingData.bestAccuracy : 0;
    AI.bestParams = hasKnowledge ? { ...trainingData.bestParams } : null;
    AI.savedSets = hasKnowledge ? trainingData.savedSets.map(s => ({ ...s, params: { ...s.params } })) : [];
    AI.totalTrials = trainingData.totalTrials || 0;
    AI.population = [];
    if (hasKnowledge) {
      // Seed from best params; mutations use learned avoidance + KNN refinement
      const tgtId = currentTargetId();
      for (let i = 0; i < AI.popSize; i++) {
        const base = i === 0 ? { ...AI.bestParams } : mutateParamsAvoid(AI.bestParams);
        const p = knnRefine(base, tgtId);
        AI.population.push({ params: p, fitness: physicsScore(p) * 0.3, sumDz: 0, sumDx: 0, sumDy: 0, sumProx: 0, count: 0 });
      }
    } else {
      AIinitPop();
    }
    AI.gen = 1;
    const badBins = Object.values(paramBinData).filter(d => d.total >= 5 && d.hits / d.total < 0.6).length;
    const tgt = currentTargetId();
    log(`=== AI started. Target: ${tgt} (0/${AI.targetOrder.length} solved). Memory: ${AI.totalTrials} past trials, ${badBins} bad zones known. ===`);
  }
  AI.idx = 0;
  AI.trial = 0;
  AI.hits = 0;
  AInextIndividual();
}

function suggestToAI() {
  const suggestion = {
    posX: config.posX,
    posZ: config.posZ,
    heading: config.heading,
    pivotHeight: config.pivotHeight,
    motorTorque: config.motorTorque,
    leverLengthLoad: config.leverLengthLoad,
    leverLengthCW: config.leverLengthCW,
    releaseAngle: config.releaseAngle,
  };
  // Ensure fixed params come from config, not current suggestion
  for (const param of FIXED_PARAMS) suggestion[param] = config[param];
  AI.bestParams = suggestion;
  AI.bestAccuracy = 1.0;
  trainingData.bestParams = { ...suggestion };
  trainingData.bestAccuracy = 1.0;
  // Re-seed population if AI is running
  if (AI.running) {
    AI.population = [];
    const tgtId = currentTargetId();
    for (let i = 0; i < AI.popSize; i++) {
      const base = i === 0 ? { ...suggestion } : mutateParamsAvoid(suggestion);
      const p = knnRefine(base, tgtId);
      AI.population.push({ params: p, fitness: physicsScore(p) * 0.3, sumDz: 0, sumDx: 0, sumDy: 0, sumProx: 0, count: 0 });
    }
    AI.gen++;
    AI.idx = 0;
    AI.trial = 0;
    AI.hits = 0;
    saveTraining();
    log(`📨 Suggested: ${JSON.stringify(suggestion)}`);
    setStatus('Suggestion seeded into AI population.');
  } else {
    saveTraining();
    log(`📨 Saved suggestion: ${JSON.stringify(suggestion)}`);
    setStatus('Suggestion saved. It will be used when AI starts.');
  }
}

function AIstop() {
  AI.running = false;
  const badBins = Object.values(paramBinData).filter(d => d.total >= 5 && d.hits / d.total < 0.6).length;
  const solved = AI.solvedTargets.length;
  const totalTgts = AI.targetOrder.length;
  const tgt = currentTargetId();
  if (AI.savedSets.length > 0) {
    log(`AI stopped. Targets: ${solved}/${totalTgts}. Current: ${tgt}. ${AI.savedSets.length} sets saved. Bad zones: ${badBins}`);
    log(`Best: ${(AI.bestAccuracy * 100).toFixed(1)}% — ${JSON.stringify(AI.bestParams)}`);
  } else if (AI.bestParams) {
    log(`AI stopped. Targets: ${solved}/${totalTgts}. Current: ${tgt}. Best: ${(AI.bestAccuracy * 100).toFixed(1)}%. Bad zones: ${badBins}`);
  } else log(`AI stopped. Targets: ${solved}/${totalTgts}. Current: ${tgt}. Bad zones: ${badBins}`);
  if (AI.bestParams) {
    const savedFixed = {};
    for (const param of FIXED_PARAMS) savedFixed[param] = config[param];
    Object.assign(config, AI.bestParams);
    for (const param of FIXED_PARAMS) if (savedFixed[param] !== undefined) config[param] = savedFixed[param];
    resetSim(true);
  }
}

function AIrecordTrial(hit, pos) {
  const cur = AI.population[AI.idx];
  const hitTargetId = hit && hitTargets.length > 0 ? hitTargets[0].id : null;
  const targetId = currentTargetId();

  // Check if the current target was hit specifically
  const hitCurrent = hit && targetId != null && hitTargets.some(t => t.id === targetId);

  // Track per-target stats globally (all targets, all time)
  if (hitTargetId && AI.targetStats[hitTargetId]) {
    AI.targetStats[hitTargetId].hits++;
  }

  const trialRec = {
    gen: AI.gen, idx: AI.idx, trial: AI.trial,
    p: { ...cur.params },
    hit, range: predictRange(cur.params),
    landX: pos ? pos.x : null, landZ: pos ? pos.z : null,
    boardY: _boardCrossY,
    proximity: _lastHitProximity,
    hitQuality: _lastHitQuality,
    targetId: hitTargetId,
    currentTarget: targetId,
    hitCurrent,
  };
  trainingData.trials.push(trialRec);
  recordParamBins(cur.params, hit);
  AI.totalTrials++;

  // Save trajectory for 3D chart (downsampled)
  if (trajectoryPoints.length > 0) {
    const pts = trajectoryPoints;
    const maxPts = 200;
    const step = Math.max(3, Math.floor(pts.length / 3 / maxPts) * 3);
    const sampled = [];
    for (let i = 0; i < pts.length; i += step) {
      if (i + 2 < pts.length) sampled.push(pts[i], pts[i + 1], pts[i + 2]);
    }
    trainingTrajectories.push({ points: sampled, hit: hitCurrent, targetId, landZ: pos ? pos.z : null });
    // Keep last 500 trajectories
    if (trainingTrajectories.length > 500) trainingTrajectories.splice(0, trainingTrajectories.length - 500);
  }
  trainingData.totalTrials = AI.totalTrials;
  trainingData.bestAccuracy = AI.bestAccuracy;
  trainingData.bestParams = AI.bestParams;
  trainingData.savedSets = AI.savedSets;
  saveTraining();
  rebuildKNN();

  // Accumulate trajectory error relative to the current target hole position
  const tgtId = currentTargetId();
  const tgtCenter = tgtId && tgtId !== 'ALL_DONE' ? getTargetCenter(tgtId) : null;
  const tgtZ = tgtCenter ? tgtCenter.z : BOARD.centerZ;
  const tgtX = tgtCenter ? tgtCenter.x : BOARD.centerX;
  const tgtY = tgtCenter ? tgtCenter.y : BOARD.centerY;
  if (pos && pos.z != null) { cur.sumDz += pos.z - tgtZ; cur.count++; }
  if (pos && pos.x != null) { cur.sumDx += pos.x - tgtX; }
  if (_boardCrossY != null) { cur.sumDy += _boardCrossY - tgtY; }
  if (_lastHitProximity > 0) { cur.sumProx += _lastHitProximity; }

  // Only count hits on current target for fitness
  if (hitCurrent) { AI.hits++; AI.genHits++; }
  AI.genTotal++;
  // Also track per-target total
  if (targetId && AI.targetStats[targetId]) AI.targetStats[targetId].total++;
  const done = AI.trial >= AI.trialsPerInd;
  if (!done) {
    AI.trial++;
    noisyTrial(cur.params);
    const bestPct = (AI.bestAccuracy * 100).toFixed(0);
    const R = predictRange(cur.params).toFixed(1);
    const genAcc = AI.genTotal > 0 ? (AI.genHits / AI.genTotal * 100).toFixed(1) : '?';
    const trend = AI.prevGenAcc != null
      ? ((AI.genHits / AI.genTotal - AI.prevGenAcc) * 100).toFixed(1)
      : null;
    const trendStr = trend != null ? `  ${trend >= 0 ? '+' : ''}${trend}%` : '';
    const errStr = cur.count > 0 ? `  dz=${(cur.sumDz/cur.count).toFixed(2)} dx=${(cur.sumDx/cur.count).toFixed(2)} dy=${(cur.sumDy/cur.count).toFixed(2)}` : '';
    const proxStr = cur.count > 0 && cur.sumProx > 0 ? `  prox=${(cur.sumProx/cur.count*100).toFixed(0)}%` : '';
    const tgt = currentTargetId();
    const tgtStats = tgt && AI.targetStats[tgt];
    const tgtStr = tgtStats ? `  ${tgt}:${tgtStats.hits}/${tgtStats.total}` : '';
    setStatus(`[AI] ${tgt} G${AI.gen}/${AI.idx+1}/${AI.popSize}  T${AI.trial}/${AI.trialsPerInd}  R=${R}m  Best:${bestPct}%${errStr}${proxStr}  Saved:${AI.savedSets.length}${tgtStr}  GenAcc:${genAcc}%${trendStr}`);
    return;
  }
  // Finished all trials for this individual
  const simAcc = AI.hits / AI.trialsPerInd;
  const phys = physicsScore(cur.params);
  const avoid = paramAvoidancePenalty(cur.params);
  // Trajectory accuracy: reward proximity to current target center (x, y, z)
  let trajectoryAcc = 0;
  if (cur.count > 0) {
    const avgDz = cur.sumDz / cur.count;
    const avgDx = cur.sumDx / cur.count;
    const avgDy = cur.count > 0 && cur.sumDy !== 0 ? cur.sumDy / cur.count : 0;
    const radialDist = Math.sqrt(avgDz * avgDz + avgDx * avgDx + avgDy * avgDy);
    trajectoryAcc = Math.exp(-radialDist);
  }
  // KNN confidence bonus: params near well-explored high-performing regions get a small boost
  const knn = knnQuery(cur.params, currentTargetId());
  const knnBonus = knn && knn.confidence > 0.4 ? knn.hitRate * knn.confidence * 0.05 : 0;
  // Proximity bonus: extra reward for hits closer to hole center
  const avgProx = cur.count > 0 && cur.sumProx > 0 ? cur.sumProx / cur.count : 0;
  const proxBonus = avgProx * 0.1;
  cur.fitness = simAcc * 0.55 + phys * 0.2 + trajectoryAcc * 0.25 - avoid + knnBonus + proxBonus;
  const pct = (cur.fitness * 100).toFixed(0);

  if (cur.fitness > AI.bestAccuracy) {
    AI.bestAccuracy = cur.fitness;
    AI.bestParams = { ...cur.params };
    trainingData.bestAccuracy = AI.bestAccuracy;
    trainingData.bestParams = AI.bestParams;
    saveTraining();
  }
  if (cur.fitness >= 0.95) {
    AI.savedSets.push({ params: { ...cur.params }, fitness: cur.fitness });
    trainingData.savedSets = AI.savedSets;
    saveTraining();
    log(`✓ Saved #${AI.savedSets.length}: ${pct}% — ${JSON.stringify(cur.params)}`);
  }

  // Check if current target is solved (≥95% accuracy with ≥20 total trials)
  const solvedTargetId = currentTargetId();
  const tgt = solvedTargetId ? AI.targetStats[solvedTargetId] : null;
  if (tgt && tgt.total >= 20) {
    const acc = tgt.hits / tgt.total;
    if (acc >= 0.95 && !AI.solvedTargets.includes(solvedTargetId)) {
      AI.solvedTargets.push(solvedTargetId);
      tgt.bestParams = { ...cur.params };
      tgt.bestAcc = cur.fitness;
      log(`=== TARGET ${solvedTargetId} SOLVED! Acc: ${(acc*100).toFixed(1)}% (${tgt.hits}/${tgt.total}) ===`);
      // Advance to next unsolved target
      AI.currentTargetIdx++;
      while (AI.currentTargetIdx < AI.targetOrder.length && AI.solvedTargets.includes(AI.targetOrder[AI.currentTargetIdx])) {
        AI.currentTargetIdx++;
      }
      if (AI.currentTargetIdx >= AI.targetOrder.length) {
        log('=== ALL TARGETS SOLVED! ===');
      } else {
        log(`Now training for target: ${currentTargetId()}`);
      }
      saveTraining();
    }
  }

  // Auto-save CSV to sim folder after each individual
  autoExportCSV();

  // Next individual or next generation
  AI.idx++;
  if (AI.idx >= AI.popSize) {
    AInextGen();
  }
  AInextIndividual();
}

function syncPhysicsVisuals() {
  if (!armBody || !trebuchetGroup) return;

  // Sync arm group — position relative to baseGroup (which has heading rotation)
  const worldPos = new THREE.Vector3(armBody.position.x, armBody.position.y, armBody.position.z);
  armGroup.parent.worldToLocal(armGroup.position.copy(worldPos));
  // Extract tilt-only rotation (baseGroup provides the heading)
  const tiltOnly = new THREE.Quaternion().copy(armBody.quaternion);
  const invHeading = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), -config.heading * RAD);
  tiltOnly.multiply(invHeading);
  armGroup.quaternion.copy(tiltOnly);

  // Sync ball mesh — follows ball body directly
  if (ballBody && ballMesh) {
    ballMesh.position.copy(ballBody.position);
    ballMesh.quaternion.copy(ballBody.quaternion);
  }

  // Trajectory trail (fixed-size ring buffer)
  if (released && ballBody) {
    trajectoryPoints.push(
      ballBody.position.x, ballBody.position.y, ballBody.position.z
    );
    const totalFloats = trajectoryPoints.length;
    const count = Math.min(totalFloats / 3, MAX_TRAIL);
    const skip = totalFloats > MAX_TRAIL * 3 ? totalFloats - MAX_TRAIL * 3 : 0;
    for (let i = 0; i < count * 3; i++) {
      trailBuffer[i] = trajectoryPoints[skip + i];
    }
    trailLine.geometry.attributes.position.needsUpdate = true;
    trailLine.geometry.setDrawRange(0, count);
  }
}

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.033);

  // Fast-forward: run multiple physics steps per frame when AI is training
  const ffSteps = (AI.running && (fired || released)) ? 12 : 1;

  for (let s = 0; s < ffSteps; s++) {
    // Motor-driven arm: keep ball at arm tip before release
    if (fired && !released && ballBody && armBody) updateCatapultBall();
    if (world) world.step(1 / 60, 1 / 60, AI.running ? 3 : 1);
    if (fired && !released) checkRelease();

    if (released && !landed) {
      // Track ball's Y when crossing the board plane (z ~ 7.5)
      if (ballBody && _boardCrossY === null) {
        const bz = ballBody.position.z;
        if (bz >= BOARD.centerZ - 0.15 && bz <= BOARD.centerZ + 0.15) {
          _boardCrossY = ballBody.position.y;
          _boardCrossVx = ballBody.velocity.x;
          _boardCrossVy = ballBody.velocity.y;
          _boardCrossVz = ballBody.velocity.z;
        }
      }
      if (AI.running && earlyFailCheck()) {
        landed = true;
        const p = ballBody.position;
        AIrecordTrial(false, { x: p.x, z: p.z });
        break;
      }
      checkTargetHit();
      checkLanding();
      if (landed) break; // AIrecordTrial may have started new trial
    }
    if (!fired) break; // resetSim was called, trial ended
  }

  syncPhysicsVisuals();
  controls.update();
  renderer.render(scene, camera);

  // Catch up clock dt so next frame doesn't try to compensate
  if (AI.running) clock.start();
}

    transformCtrl.visible = v;
    if (!v) { transformCtrl.detach(); return; }
    const tgt = gizmoState.target === 'Arm Pivot' ? pivotDot : gizmoState.target === 'Ball Offset' ? pivotDotGreen : pivotDotOrange;
    if (tgt) transformCtrl.attach(tgt);
  });
  calFolder.add(gizmoState, 'target', ['Arm Pivot', 'Base Pivot', 'Ball Offset']).name('Target').onChange(v => {
    gizmoTarget = v;
    if (!transformCtrl || !transformCtrl.visible) return;
    const tgt = v === 'Arm Pivot' ? pivotDot : v === 'Ball Offset' ? pivotDotGreen : pivotDotOrange;
    if (tgt) transformCtrl.attach(tgt);
  });
  calFolder.open();

  return gui;
}

// Bind file input in module scope
document.getElementById('csvInput').addEventListener('change', function() {
  importCSVHandler(this.files);
});

// ===== START =====
initScene();
const mats = initPhysics();
buildArena();
buildFieldBarriers();
buildTargetBoard();
buildTargetOrder();
buildTrebuchet();
buildTrail();
const gui = initGUI();

// Load CAD models asynchronously
loadGLBModels();

// Auto-load previous training data (including param-zone knowledge)
loadTraining();
if (trainingData.totalTrials > 0) {
  AI.totalTrials = trainingData.totalTrials;
  AI.bestAccuracy = trainingData.bestAccuracy;
  AI.bestParams = trainingData.bestParams;
  AI.savedSets = trainingData.savedSets;
  const badBins = Object.values(paramBinData).filter(d => d.total >= 5 && d.hits / d.total < 0.6).length;

  // Find the parameter set whose landings were closest to the target board (z=7.5)
  let closestSet = null, closestDist = Infinity;
  const byParams = {};
  for (const tr of trainingData.trials) {
    const key = JSON.stringify(tr.p);
    if (!byParams[key]) { byParams[key] = { params: tr.p, landZ: [], count: 0 }; }
    if (tr.landZ != null) { byParams[key].landZ.push(tr.landZ); }
    byParams[key].count++;
  }
  for (const key in byParams) {
    const e = byParams[key];
    if (e.landZ.length === 0) continue;
    // If any of this set's landings hit the target zone (z=5-11), consider it
    const inZone = e.landZ.filter(z => z >= 5 && z <= 11);
    if (inZone.length > 0) {
      const avgZ = inZone.reduce((a, b) => a + b, 0) / inZone.length;
      const dist = Math.abs(avgZ - 7.5);
      if (dist < closestDist) {
        closestDist = dist;
        closestSet = e.params;
      }
    }
  }
  // Prefer savedSets (≥95% accuracy) over closest-landing set
  const bestConfig = trainingData.savedSets.length > 0
    ? trainingData.savedSets[0].params
    : (closestSet || trainingData.bestParams);
  if (bestConfig) {
    const savedFixed = {};
    for (const param of FIXED_PARAMS) savedFixed[param] = config[param];
    Object.assign(config, bestConfig);
    // Preserve current fixed param values (user-set, AI can't change)
    for (const param of FIXED_PARAMS) if (savedFixed[param] !== undefined) config[param] = savedFixed[param];
    buildTrebuchet();
  }

  const tgt = currentTargetId();
  log(`Memory loaded: ${trainingData.totalTrials} past trials, ${badBins} bad zones known. Best ${(trainingData.bestAccuracy*100).toFixed(1)}%. ${AI.solvedTargets.length}/${AI.targetOrder.length} targets solved.`);
  setStatus(`Memory loaded: ${trainingData.totalTrials} trials. ${AI.solvedTargets.length}/${AI.targetOrder.length} targets solved. Current: ${tgt}. START or RESUME AI ⚡`);
} else {
  log('No memory found. Starting fresh.');
}

// ===== Keyboard Controls =====
document.addEventListener('keydown', (e) => {
  const key = e.key;

  // Position/heading adjustment (lowercase)
  if (key === 'w') { if (!fired && !AI.running) { config.posZ += 0.02; buildTrebuchet(); } }
  else if (key === 's') { if (!fired && !AI.running) { config.posZ -= 0.02; buildTrebuchet(); } }
  else if (key === 'a') { if (!fired && !AI.running) { config.heading -= 1; buildTrebuchet(); } }
  else if (key === 'd') { if (!fired && !AI.running) { config.heading += 1; buildTrebuchet(); } }
  else if (key === 'ArrowUp') { if (!fired && !AI.running) { config.posZ += 0.02; buildTrebuchet(); } }
  else if (key === 'ArrowDown') { if (!fired && !AI.running) { config.posZ -= 0.02; buildTrebuchet(); } }
  else if (key === 'ArrowLeft') { if (!fired && !AI.running) { config.heading -= 1; buildTrebuchet(); } }
  else if (key === 'ArrowRight') { if (!fired && !AI.running) { config.heading += 1; buildTrebuchet(); } }
  else if (key === ' ' || key === 'Space') { e.preventDefault(); fireTrebuchet(); }
  else if (key === 'r' || key === 'R') { if (!fired && !AI.running) resetSim(); }
  // View shortcuts (uppercase = Shift+key)
  else if (key === 'T') {
    camera.position.set(0, 12, 4); controls.target.set(0, 0.5, 4); controls.update();
  }
  else if (key === 'S') {
    camera.position.set(12, 4, 4); controls.target.set(0, 1, 4); controls.update();
  }
});

animate();

log('Simulation loaded. WASD/Arrows drive • Space Fire • R Reset • Shift+T Top • Shift+S Side');
setStatus('Ready. WASD Position, Space Fire, R Reset');

console.log('Baseball Trebuchet Arena Simulation loaded.');

// Expose key objects on window so console paste-scripts can access them
window.trainingData = trainingData;
window.AI = AI;
window.paramBinData = paramBinData;
window.saveTraining = saveTraining;
window.importCSVHandler = importCSVHandler;
</script>
